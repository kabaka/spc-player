<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="credentialless" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <title>SPC Player</title>
    <script>
      (function () {
        var theme = localStorage.getItem('spc-theme');
        var resolved;
        if (theme === 'dark' || theme === 'light') {
          resolved = theme;
        } else {
          var preferLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          resolved = preferLight ? 'light' : 'dark';
        }
        document.documentElement.classList.add(resolved);
      })();
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <a href="#player-controls" class="skip-link">Skip to player controls</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
